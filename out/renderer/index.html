<!doctype html>
<html lang="fr" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Electron CSP. blob: workers + eval are needed by the in-renderer WASM
         voice engines: the ONNX runtime needs 'wasm-unsafe-eval', and Vosk's
         emscripten WASM additionally requires 'unsafe-eval'. (This loosens
         script-src; it's a deliberate tradeoff for the offline Vosk engine.
         The renderer only loads our own bundle + trusted model CDNs.)
         connect-src allows on-demand model downloads (Hugging Face for Whisper,
         GitHub Pages for the Vosk model, jsDelivr for the ONNX runtime). The
         realtime-voice WebSocket is NOT here on purpose: it lives in the main
         process (the gateway key authenticates the upgrade). -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
        script-src 'self' 'wasm-unsafe-eval' 'unsafe-eval' blob:;
        worker-src 'self' blob:;
        child-src 'self' blob:;
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: blob:;
        media-src 'self' blob:;
        connect-src 'self' blob: data:
          https://geocoding-api.open-meteo.com https://api.open-meteo.com
          https://huggingface.co https://*.huggingface.co https://*.hf.co
          https://cdn.jsdelivr.net https://ccoreilly.github.io"
    />
    <title>Alex</title>
    <script src="./three.min.js"></script>
    <script type="module" crossorigin src="./assets/index-IxiuGhEc.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-C645F3oL.css">
  </head>
  <body class="h-full flex flex-col">
    <div id="root" class="flex flex-1 flex-col min-h-0"></div>
  </body>
</html>
